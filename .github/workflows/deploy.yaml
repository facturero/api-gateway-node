name: CI/CD Deploy to K3s

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/api-gateway-node" >> $GITHUB_ENV

      - name: Login GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${REGISTRY} -u ${{ github.actor }} --password-stdin

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          push: true

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/api-gateway-node" >> $GITHUB_ENV

      - name: Install sops & age (AMD64)
        run: |
          if ! command -v sops &> /dev/null; then
            SOPS_VERSION=$(curl -sI https://github.com/getsops/sops/releases/latest | grep -i location | grep -oP 'v\K[0-9.]+')
            wget -O /tmp/sops "https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.amd64"
            sudo mv /tmp/sops /usr/local/bin/sops
            sudo chmod +x /usr/local/bin/sops
          fi
          if ! command -v age &> /dev/null; then
            AGE_VERSION=$(curl -sI https://github.com/FiloSottile/age/releases/latest | grep -i location | grep -oP 'v\K[0-9.]+')
            wget -O /tmp/age.tar.gz "https://github.com/FiloSottile/age/releases/latest/download/age-v${AGE_VERSION}-linux-amd64.tar.gz"
            sudo tar -xzf /tmp/age.tar.gz -C /usr/local/bin --strip-components=1 age/age age/age-keygen
            rm -f /tmp/age.tar.gz
          fi

      - name: Setup age decryption key
        run: |
          set -e
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
          chmod 600 ~/.config/sops/age/keys.txt
          # Verifica el formato antes de continuar
          if ! grep -q 'AGE-SECRET-KEY' ~/.config/sops/age/keys.txt; then
            echo "ERROR: el secret SOPS_AGE_KEY no tiene formato de clave age válida" >&2
            exit 1
          fi

      - name: Decrypt secrets and update JWT secret
        run: |
          set -e
          sops --decrypt --input-type dotenv --output-type dotenv config/secrets.production.enc > /tmp/.env

          # Sanity check: si el archivo resultante aún tiene contenido ENC[...],
          # sops no desencriptó y estamos por aplicar basura a k8s.
          if grep -q '^ENC\[' /tmp/.env; then
            echo "ERROR: /tmp/.env aún contiene ENC[...] tras 'sops -d'. Abortando." >&2
            rm -f /tmp/.env
            exit 1
          fi
          if ! grep -q '^JWT_PUBLIC_KEY=' /tmp/.env; then
            echo "ERROR: /tmp/.env no tiene JWT_PUBLIC_KEY tras desencriptar." >&2
            rm -f /tmp/.env
            exit 1
          fi

          # Cargar las vars al ambiente del shell
          set -a
          source /tmp/.env
          set +a

          # Crear/actualizar el secret del gateway con la clave pública
          kubectl create secret generic gateway-jwt \
            --from-literal=public-key="$JWT_PUBLIC_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Limpieza
          rm -f /tmp/.env

      - name: Update image and deploy
        run: |
          set -e
          export REGISTRY=${REGISTRY}
          export IMAGE_NAME=${IMAGE_NAME}
          export IMAGE_TAG=${{ github.sha }}
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment api-gateway-node
