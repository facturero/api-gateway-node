apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-node
  labels:
    app: api-gateway-node
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-node
  template:
    metadata:
      labels:
        app: api-gateway-node
    spec:
      containers:
        - name: gateway
          image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: JWT_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-jwt
                  key: public-key
            - name: JWT_ISSUER
              value: "auth-service"
            - name: JWT_AUDIENCE
              value: "crm-api"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service-node:3001"
            - name: CORS_ORIGIN
              value: "https://tudominio.com"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: RATE_LIMIT_MAX
              value: "120"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10